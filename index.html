<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onyx - Pure AI Insider Risk Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app-layout">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <h1>Onyx</h1>
        <span class="version-tag">Pure AI SLM Engine v2.0</span>
      </div>
      <div class="header-actions">
        <label for="file-upload" class="upload-btn">
          <span>+ Upload Raw Comms</span>
          <input type="file" id="file-upload" accept=".json,.eml" style="display: none;">
        </label>
        <div id="slm-status" class="slm-status">
          <span class="slm-dot checking"></span>
          <span id="slm-label">Connecting SLM...</span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Top Metrics -->
      <section class="metrics-row">
        <div class="metric-card glass-panel">
          <div class="metric-value" id="active-alerts">0</div>
          <div class="metric-label">Analyzed Events</div>
        </div>
        <div class="metric-card glass-panel warning-border">
          <div class="metric-value text-warning" id="escalations">0</div>
          <div class="metric-label">Critical Risks Detected</div>
        </div>
        <div class="metric-card glass-panel">
          <div class="metric-value text-accent" id="accuracy">99%</div>
          <div class="metric-label">SLM Cognitive Confidence</div>
        </div>
      </section>

      <!-- Dashboard Split -->
      <section class="dashboard-split">

        <!-- Left: List -->
        <aside class="alerts-sidebar glass-panel">
          <div class="sidebar-header">
            <h2>Data Stream</h2>
            <button class="icon-btn" id="clean-button" title="Clear Stream">⟳ Clear</button>
          </div>
          <div id="upload-status" class="status-msg">Waiting for data injection...</div>
          <div id="alert-list" class="alert-list">
            <!-- Alert items injected via JS -->
          </div>
        </aside>

        <!-- Right: Detail -->
        <section class="alert-detail glass-panel">
          <div class="detail-header">
            <div class="case-meta">
              <span id="scenario-count">Case 0 of 0</span>
              <span id="scenario-severity" class="badge">N/A</span>
            </div>
            <button class="primary-btn" id="demo-button">Simulate Next Event ➔</button>
          </div>

          <div class="detail-cards">
            <div id="evidence-card" class="detail-card">
              <!-- Evidence injected here -->
              <div class="text-muted">Select an event from the stream to view Pure AI analysis.</div>
            </div>
          </div>
        </section>

      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>

</html>
